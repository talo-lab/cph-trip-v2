<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3 Days of Design 2026 · Copenhagen Trip Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,400&family=Space+Mono:wght@400;700&family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --ink:#1a1714;
    --paper:#f4 efe6;
    --paper:#f5efe4;
    --cream:#fbf7ee;
    --rust:#c8492a;
    --rust-deep:#9c3318;
    --ochre:#d99021;
    --sage:#5d7456;
    --teal:#2f6b6b;
    --plum:#6d3b54;
    --slate:#3a4a5a;
    --line:#ddd2bf;
    --shadow:rgba(40,30,20,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Archivo',sans-serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  ::selection{background:var(--rust);color:var(--cream)}

  .app{display:grid;grid-template-columns:minmax(380px,440px) 1fr;height:100vh}

  /* ============ SIDEBAR ============ */
  .panel{
    background:var(--cream);
    border-right:2px solid var(--ink);
    display:flex;flex-direction:column;
    overflow:hidden;
    position:relative;
  }
  .panel::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:radial-gradient(var(--line) .5px,transparent .5px);
    background-size:14px 14px;opacity:.5;
  }
  header.brand{
    padding:22px 24px 18px;
    border-bottom:2px solid var(--ink);
    position:relative;z-index:1;
    background:var(--rust);
    color:var(--cream);
  }
  .kicker{
    font-family:'Space Mono',monospace;
    font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    opacity:.85;display:flex;justify-content:space-between;align-items:center;
  }
  .kicker .dot{width:8px;height:8px;border-radius:50%;background:var(--ochre);box-shadow:0 0 0 3px rgba(217,144,33,.3)}
  h1{
    font-family:'Fraunces',serif;
    font-weight:600;font-size:34px;line-height:.95;margin-top:8px;
    letter-spacing:-.01em;font-optical-sizing:auto;
  }
  h1 em{font-style:italic;color:var(--ochre)}
  .sub{font-size:12.5px;margin-top:8px;opacity:.9;font-weight:500}

  .tabs{
    display:flex;gap:0;border-bottom:2px solid var(--ink);
    position:relative;z-index:1;background:var(--cream);
  }
  .tab{
    flex:1;padding:11px 4px;border:none;background:none;cursor:pointer;
    font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--ink);opacity:.5;
    border-right:1px solid var(--line);transition:.18s;
  }
  .tab:last-child{border-right:none}
  .tab.active{opacity:1;background:var(--ink);color:var(--cream)}
  .tab:hover:not(.active){opacity:.8;background:rgba(0,0,0,.04)}

  .scroll{flex:1;overflow-y:auto;position:relative;z-index:1;padding:8px 0 80px}
  .scroll::-webkit-scrollbar{width:9px}
  .scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:0}
  .scroll::-webkit-scrollbar-track{background:transparent}

  /* ============ DAY CARD ============ */
  .day{border-bottom:1px solid var(--line);}
  .day-head{
    display:flex;align-items:baseline;gap:10px;padding:16px 24px 6px;
    cursor:pointer;user-select:none;
  }
  .day-num{
    font-family:'Space Mono',monospace;font-size:11px;font-weight:700;
    background:var(--ink);color:var(--cream);padding:3px 7px;letter-spacing:.05em;
    white-space:nowrap;
  }
  .day-num.fest{background:var(--rust)}
  .day-date{font-family:'Fraunces',serif;font-size:19px;font-weight:600}
  .day-tag{font-size:11px;color:var(--slate);font-weight:600;margin-left:auto;text-align:right;line-height:1.2}
  .day-body{padding:4px 24px 16px}

  .item{
    display:flex;gap:11px;padding:9px 0;border-bottom:1px dashed var(--line);
    position:relative;
  }
  .item:last-child{border-bottom:none}
  .item-time{
    font-family:'Space Mono',monospace;font-size:11px;color:var(--rust-deep);
    font-weight:700;white-space:nowrap;padding-top:2px;min-width:46px;
  }
  .item-main{flex:1;min-width:0}
  .item-title{font-size:14px;font-weight:600;line-height:1.25}
  .item-title[contenteditable]{outline:none;border-radius:3px;transition:.15s}
  .item-title[contenteditable]:focus{background:#fff4d6;box-shadow:0 0 0 2px var(--ochre)}
  .item-note{font-size:12px;color:var(--slate);margin-top:2px;line-height:1.35}
  .item-note[contenteditable]:focus{outline:none;background:#fff4d6;box-shadow:0 0 0 2px var(--ochre);border-radius:3px}
  .item-dist{display:inline-block;font-size:10px;font-family:'Space Mono',monospace;color:var(--cream);background:var(--sage);padding:1px 5px;margin-top:4px;letter-spacing:.03em}
  .item-walk{display:flex;align-items:center;gap:6px;padding:4px 24px;font-size:11px;font-family:'Space Mono',monospace;color:var(--slate);opacity:.7}
  .item-walk::before{content:'';display:block;width:16px;height:1px;background:var(--slate);opacity:.4}
  .item-walk::after{content:'';display:block;flex:1;height:1px;background:var(--slate);opacity:.15}
  .item-x{
    opacity:0;border:none;background:none;cursor:pointer;color:var(--rust);
    font-size:16px;line-height:1;padding:2px 4px;align-self:flex-start;transition:.15s;
  }
  .item:hover .item-x{opacity:.6}
  .item-x:hover{opacity:1!important;transform:scale(1.2)}
  .add-item{
    width:100%;margin-top:8px;padding:7px;border:1.5px dashed var(--line);
    background:none;cursor:pointer;font-family:'Space Mono',monospace;font-size:11px;
    color:var(--slate);letter-spacing:.05em;transition:.15s;
  }
  .add-item:hover{border-color:var(--rust);color:var(--rust);background:rgba(200,73,42,.04)}

  /* ============ FESTIVAL EVENTS TAB ============ */
  .fest-wrap{display:flex;flex-direction:column;height:100%}
  .fest-filters{display:flex;gap:6px;padding:12px 16px 8px;flex-wrap:wrap;border-bottom:1px solid var(--line);flex-shrink:0}
  .fest-filter-btn{
    font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.05em;
    padding:4px 10px;border:1.5px solid var(--line);background:none;cursor:pointer;
    color:var(--slate);transition:.15s;
  }
  .fest-filter-btn.active{background:var(--ink);color:var(--cream);border-color:var(--ink)}
  .fest-filter-btn.dist-btn.active{background:var(--rust);border-color:var(--rust)}
  .fest-list{flex:1;overflow-y:auto;padding:0}
  .fest-event{
    display:flex;gap:10px;padding:11px 16px;border-bottom:1px dashed var(--line);
    cursor:pointer;transition:.12s;align-items:flex-start;
  }
  .fest-event:hover{background:rgba(0,0,0,.03)}
  .fest-event.checked{background:rgba(200,73,42,.06)}
  .fest-cb{width:16px;height:16px;flex-shrink:0;accent-color:var(--rust);margin-top:2px;cursor:pointer}
  .fest-body{flex:1;min-width:0}
  .fest-title{font-size:13px;font-weight:600;line-height:1.25;margin-bottom:2px}
  .fest-meta{font-size:11px;color:var(--slate);display:flex;gap:6px;flex-wrap:wrap;margin-bottom:3px}
  .fest-time{font-family:'Space Mono',monospace;color:var(--rust-deep);font-weight:700}
  .fest-venue{color:var(--slate)}
  .fest-dk{font-size:10px;padding:1px 5px;border-radius:2px;color:#fff;font-weight:600}
  .fest-desc{font-size:11.5px;color:var(--slate);line-height:1.35}
  .fest-add-bar{
    padding:12px 16px;border-top:2px solid var(--ink);background:var(--cream);
    display:flex;align-items:center;gap:10px;flex-shrink:0;
  }
  .fest-add-btn{
    flex:1;padding:9px;background:var(--rust);color:#fff;border:none;cursor:pointer;
    font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.05em;
    transition:.15s;
  }
  .fest-add-btn:hover{background:var(--rust-deep)}
  .fest-add-btn:disabled{background:var(--line);color:var(--slate);cursor:default}
  .fest-count{font-family:'Space Mono',monospace;font-size:11px;color:var(--slate);white-space:nowrap}
  .fest-title-link{cursor:pointer;text-decoration:underline;text-underline-offset:3px;text-decoration-color:var(--line)}
  .fest-title-link:hover{text-decoration-color:var(--rust);color:var(--rust)}
  .fest-cat-badge{font-size:10px;padding:1px 5px;border-radius:2px;color:#fff;font-weight:600;letter-spacing:.02em}

  /* ============ EVENT DETAIL MODAL ============ */
  .ev-overlay{
    position:fixed;inset:0;background:rgba(26,23,20,.6);z-index:9000;
    display:flex;align-items:flex-end;justify-content:center;
    backdrop-filter:blur(2px);animation:fadeIn .18s ease;
  }
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .ev-modal{
    background:var(--cream);width:100%;max-width:480px;max-height:88vh;
    border-top:3px solid var(--ink);overflow-y:auto;
    animation:slideUp .22s ease;position:relative;
  }
  @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
  .ev-header{
    background:var(--rust);color:var(--cream);padding:16px 20px 14px;
    position:sticky;top:0;z-index:1;
  }
  .ev-close{
    position:absolute;top:12px;right:14px;background:none;border:none;
    color:var(--cream);font-size:20px;cursor:pointer;opacity:.8;line-height:1;
    padding:2px 6px;
  }
  .ev-close:hover{opacity:1}
  .ev-hed-title{font-family:'Fraunces',serif;font-size:18px;font-weight:600;line-height:1.2;padding-right:28px}
  .ev-hed-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;font-size:11px;opacity:.88}
  .ev-hed-time{font-family:'Space Mono',monospace;font-weight:700}
  .ev-hed-dk{padding:1px 6px;border-radius:2px;font-weight:600}
  .ev-photo{
    width:100%;height:160px;object-fit:cover;display:block;
    background:var(--ink);position:relative;overflow:hidden;
  }
  .ev-photo-placeholder{
    width:100%;height:160px;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:6px;
    background:linear-gradient(135deg,var(--ink) 0%,#2d3a2e 100%);
    color:var(--cream);opacity:.9;
  }
  .ev-photo-icon{font-size:36px;opacity:.6}
  .ev-photo-vname{font-family:'Space Mono',monospace;font-size:11px;opacity:.5;letter-spacing:.08em}
  .ev-body{padding:18px 20px 24px;display:flex;flex-direction:column;gap:14px}
  .ev-section{}
  .ev-section-label{
    font-family:'Space Mono',monospace;font-size:10px;font-weight:700;
    letter-spacing:.1em;text-transform:uppercase;color:var(--slate);
    margin-bottom:5px;display:flex;align-items:center;gap:6px;
  }
  .ev-section-label::after{content:'';flex:1;height:1px;background:var(--line)}
  .ev-section-body{font-size:13px;line-height:1.55;color:var(--ink)}
  .ev-badge{
    display:inline-flex;align-items:center;gap:5px;padding:5px 10px;
    font-size:12px;font-weight:600;border-radius:2px;
  }
  .ev-badge.ok{background:#e8f5e9;color:#2e7d32}
  .ev-badge.warn{background:#fff3e0;color:#e65100}
  .ev-badge.req{background:#fce4ec;color:#c62828}
  .ev-items-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .ev-chip{
    font-size:11.5px;padding:4px 9px;border:1px solid var(--line);
    background:var(--cream);color:var(--slate);border-radius:2px;
  }
  .ev-loading{display:flex;align-items:center;gap:8px;color:var(--slate);font-size:13px;padding:8px 0}
  .ev-spin{display:inline-block;width:14px;height:14px;border:2px solid var(--line);
    border-top-color:var(--rust);border-radius:50%;animation:sp .7s linear infinite}
  .ev-add-row{
    display:flex;gap:8px;padding:0 20px 20px;
  }
  .ev-add-btn{
    flex:1;padding:11px;background:var(--rust);color:#fff;border:none;cursor:pointer;
    font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.05em;
  }
  .ev-add-btn:hover{background:var(--rust-deep)}
  .ev-add-btn.done{background:var(--sage)}
  .ev-booking-link{
    display:inline-flex;align-items:center;gap:4px;
    font-size:12px;font-weight:700;color:var(--teal);
    text-decoration:none;border-bottom:1.5px solid var(--teal);
    padding-bottom:1px;transition:.15s;
  }
  .ev-booking-link:hover{color:var(--rust);border-color:var(--rust)}

  /* ============ DISTRICTS TAB ============ */
  .dist-list{padding:10px 0}
  .dist{
    display:flex;align-items:center;gap:12px;padding:13px 24px;cursor:pointer;
    border-bottom:1px solid var(--line);transition:.15s;
  }
  .dist:hover{background:rgba(0,0,0,.03)}
  .dist-swatch{width:18px;height:18px;border-radius:50%;flex-shrink:0;border:2px solid var(--ink)}
  .dist-info{flex:1}
  .dist-name{font-family:'Fraunces',serif;font-size:16px;font-weight:600}
  .dist-desc{font-size:11.5px;color:var(--slate);margin-top:1px}
  .dist-go{font-family:'Space Mono',monospace;font-size:10px;color:var(--rust);opacity:0;transition:.15s}
  .dist:hover .dist-go{opacity:1}

  /* ============ INFO TAB ============ */
  .info{padding:18px 24px;font-size:13px;line-height:1.6}
  .info h3{font-family:'Fraunces',serif;font-size:17px;margin:18px 0 6px;color:var(--rust-deep)}
  .info h3:first-child{margin-top:0}
  .info p{margin-bottom:8px;color:var(--slate)}
  .info ul{list-style:none;margin:6px 0}
  .info li{padding:5px 0 5px 18px;position:relative;border-bottom:1px dotted var(--line)}
  .info li::before{content:"▸";position:absolute;left:0;color:var(--ochre)}
  .info b{color:var(--ink)}
  .chip{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;background:var(--ink);color:var(--cream);padding:2px 6px;margin:2px 3px 2px 0;letter-spacing:.04em}

  /* save indicator */
  .saver{
    position:absolute;bottom:14px;left:24px;right:24px;z-index:2;
    font-family:'Space Mono',monospace;font-size:10px;color:var(--sage);
    display:flex;align-items:center;gap:6px;opacity:0;transition:.3s;letter-spacing:.05em;
  }
  .saver.show{opacity:1}
  .saver .pulse{width:6px;height:6px;border-radius:50%;background:var(--sage)}
  .reset{
    position:absolute;bottom:10px;right:18px;z-index:3;border:1px solid var(--line);
    background:var(--cream);font-family:'Space Mono',monospace;font-size:9px;
    padding:4px 8px;cursor:pointer;color:var(--slate);letter-spacing:.05em;
  }
  .reset:hover{border-color:var(--rust);color:var(--rust)}

  /* ============ MAP ============ */
  .map-wrap{position:relative}
  #map{height:100%;width:100%;background:#e8e0d0;filter:saturate(.92)}
  .leaflet-container{font-family:'Archivo',sans-serif}
  .map-legend{
    position:absolute;top:18px;right:18px;z-index:500;background:var(--cream);
    border:2px solid var(--ink);padding:12px 14px;box-shadow:4px 4px 0 var(--shadow);
    max-width:200px;
  }
  .map-legend h4{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
  .leg-row{display:flex;align-items:center;gap:8px;font-size:11.5px;padding:2px 0;cursor:pointer}
  .leg-row:hover{font-weight:700}
  .leg-dot{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--ink)}
  .map-title{
    position:absolute;bottom:18px;left:18px;z-index:500;background:var(--ink);
    color:var(--cream);padding:8px 14px;font-family:'Space Mono',monospace;font-size:11px;
    letter-spacing:.08em;box-shadow:4px 4px 0 var(--shadow);
  }
  .gps-btn{
    position:absolute;bottom:18px;right:18px;z-index:500;background:var(--cream);
    border:2px solid var(--ink);padding:9px 14px;font-family:'Space Mono',monospace;font-size:11px;
    letter-spacing:.05em;cursor:pointer;box-shadow:4px 4px 0 var(--shadow);transition:.15s;font-weight:700;
  }
  .gps-btn:hover{background:var(--ink);color:var(--cream)}
  .gps-btn.active{background:var(--teal);color:#fff;border-color:var(--teal)}
  .gps-btn:disabled{opacity:.6;cursor:wait}
  .me-dot{
    width:18px;height:18px;border-radius:50%;background:#2f6b6b;border:3px solid #fff;
    box-shadow:0 0 0 2px var(--teal),0 2px 6px rgba(0,0,0,.4);
  }
  .me-pulse{animation:mepulse 2s ease-out infinite}
  @keyframes mepulse{0%{box-shadow:0 0 0 0 rgba(47,107,107,.5)}70%{box-shadow:0 0 0 16px rgba(47,107,107,0)}100%{box-shadow:0 0 0 0 rgba(47,107,107,0)}}
  .gps-info{
    position:absolute;bottom:62px;right:18px;z-index:500;background:#fff;border:2px solid var(--teal);
    padding:9px 12px;font-size:11.5px;max-width:220px;box-shadow:4px 4px 0 var(--shadow);display:none;line-height:1.45;
  }
  .gps-info.show{display:block}
  .gps-info b{color:var(--teal)}
  .pin{
    background:var(--rust);color:#fff;border:2px solid var(--ink);border-radius:50% 50% 50% 0;
    width:26px;height:26px;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;
    box-shadow:2px 3px 4px var(--shadow);
  }
  .pin span{transform:rotate(45deg);font-family:'Space Mono',monospace;font-size:11px;font-weight:700}
  .pin.home{background:var(--ink);width:30px;height:30px}
  .pin.home span{color:var(--ochre);font-size:14px}
  .leg-dot{display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--ochre);line-height:1}
  .leaflet-popup-content-wrapper{border-radius:0;border:2px solid var(--ink);box-shadow:4px 4px 0 var(--shadow)}
  .leaflet-popup-content{margin:12px 16px;font-family:'Archivo'}
  .pop-name{font-family:'Fraunces',serif;font-size:16px;font-weight:600;margin-bottom:3px}
  .pop-desc{font-size:12px;color:var(--slate);line-height:1.4}

  /* ============ ADD-PLACE TAB ============ */
  .add-wrap{padding:18px 24px}
  .add-wrap h3{font-family:'Fraunces',serif;font-size:18px;color:var(--rust-deep);margin-bottom:4px}
  .add-wrap .lead{font-size:12.5px;color:var(--slate);line-height:1.5;margin-bottom:14px}
  .field-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);margin:12px 0 5px;display:block}
  .add-input{
    width:100%;border:1.5px solid var(--ink);background:#fff;padding:10px 11px;
    font-family:'Archivo';font-size:13.5px;color:var(--ink);resize:vertical;line-height:1.4;
  }
  .add-input:focus{outline:none;box-shadow:3px 3px 0 var(--shadow)}
  textarea.add-input{min-height:64px}
  .add-btn{
    width:100%;margin-top:12px;padding:12px;border:none;cursor:pointer;background:var(--rust);
    color:var(--cream);font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.08em;
    text-transform:uppercase;font-weight:700;transition:.15s;
  }
  .add-btn:hover{background:var(--rust-deep)}
  .add-btn:disabled{background:var(--line);color:var(--slate);cursor:wait}
  .hint{font-size:11px;color:var(--slate);margin-top:8px;line-height:1.45;opacity:.8}
  .status{
    margin-top:14px;padding:11px 13px;border-left:3px solid var(--ochre);background:#fff8ea;
    font-size:12.5px;line-height:1.5;color:var(--ink);display:none;
  }
  .status.show{display:block}
  .status.err{border-left-color:var(--rust);background:#fceee9}
  .status .spin{display:inline-block;width:11px;height:11px;border:2px solid var(--ochre);
    border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .placed{margin-top:8px;font-family:'Space Mono',monospace;font-size:11px}
  .placed b{color:var(--rust-deep)}
  .quick{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .quick button{
    border:1px solid var(--line);background:var(--cream);font-size:11px;padding:5px 9px;cursor:pointer;
    font-family:'Archivo';color:var(--slate);transition:.15s;
  }
  .quick button:hover{border-color:var(--rust);color:var(--rust)}
  .item.user-added{background:linear-gradient(90deg,rgba(217,144,33,.1),transparent)}
  .item-src{display:inline-block;font-size:10px;font-family:'Space Mono',monospace;color:var(--ochre);margin-top:3px}
  .item.fixed{background:linear-gradient(90deg,rgba(45,107,107,.13),transparent);border-left:3px solid var(--teal);padding-left:8px;margin-left:-11px}

/* ---------- STATE / PERSISTENCE ---------- */
const STORE_KEY = 'cph_design_plan_v3';
let plan;
async function loadPlan(){
  try{
    const r = await window.storage.get(STORE_KEY);
    plan = r && r.value ? JSON.parse(r.value) : structuredClone(DEFAULT_PLAN);
  }catch(e){
    plan = structuredClone(DEFAULT_PLAN);
  }
}
let saveTimer;
async function savePlan(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async()=>{
    try{
      await window.storage.set(STORE_KEY, JSON.stringify(plan), false);
      const s=document.getElementById('saver'); s.classList.add('show');
      setTimeout(()=>s.classList.remove('show'),1400);
    }catch(e){}
  },400);
}

/* ---------- PLAN MAP VISUALIZATION ---------- */
let routeLayer = null;
let planPinLayer = [];
let selRouteLayer = null;
let planSelItems = []; // [{di,ii,lat,lng,title}] max 2

function getItemCoords(it){
  if(it._lat && it._lng) return {lat:it._lat, lng:it._lng};
  if(it._dk){
    const d = DISTRICTS.find(x=>x.key===it._dk);
    if(d) return {lat:d.lat, lng:d.lng};
  }
  return null;
}

function clearPlanPins(){
  planPinLayer.forEach(m=>map.removeLayer(m));
  planPinLayer=[];
}

function renderPlanMarkers(di){
  clearPlanPins();
  let num=0;
  plan[di].items.forEach((it)=>{
    const coords = getItemCoords(it);
    if(!coords) return;
    num++;
    const color = it._fixed?'#2f6b6b':it._user?'#d99021':'#c8492a';
    const icon = L.divIcon({
      className:'',
      html:`<div class="pin" style="background:${color};width:22px;height:22px;font-size:10px"><span>${num}</span></div>`,
      iconSize:[22,22],iconAnchor:[11,22],popupAnchor:[0,-24]
    });
    const m = L.marker([coords.lat,coords.lng],{icon}).addTo(map);
    m.bindPopup(`<div class="pop-name">${it.title}</div><div class="pop-desc">${it.note||it.time||''}</div>`);
    planPinLayer.push(m);
  });
}

function updateDayViz(di){
  if(routeLayer){ map.removeLayer(routeLayer); routeLayer=null; }
  const pts = plan[di].items.filter(it=>it._lat&&it._lng).map(it=>[it._lat,it._lng]);
  if(pts.length>=2){
    routeLayer = L.polyline(pts,{color:'#c8492a',weight:3,opacity:.7,dashArray:'6 5'}).addTo(map);
    map.fitBounds(routeLayer.getBounds(),{padding:[40,40],maxZoom:15});
  }
  renderPlanMarkers(di);
}

// 2개 항목 선택 시 지도에 거리선 표시
function togglePlanSel(di, ii, lat, lng, title, dotEl){
  const key = `${di}-${ii}`;
  const idx = planSelItems.findIndex(x=>x.key===key);
  if(idx>=0){
    planSelItems.splice(idx,1);
    dotEl.classList.remove('on');
  } else {
    if(planSelItems.length>=2){
      // 기존 첫 번째 제거
      const old = planSelItems.shift();
      document.querySelector(`[data-selkey="${old.key}"]`)?.classList.remove('on');
    }
    planSelItems.push({key,di,ii,lat,lng,title});
    dotEl.classList.add('on');
  }
  // 선택 경로 업데이트
  if(selRouteLayer){ map.removeLayer(selRouteLayer); selRouteLayer=null; }
  if(planSelItems.length===2){
    const a=planSelItems[0], b=planSelItems[1];
    selRouteLayer = L.polyline([[a.lat,a.lng],[b.lat,b.lng]],
      {color:'#d99021',weight:3,opacity:.9,dashArray:'4 4'}).addTo(map);
    const km = haversineKm(a.lat,a.lng,b.lat,b.lng);
    const min = Math.max(1,Math.round(km/5*60));
    selRouteLayer.bindPopup(
      `<div class="pop-name">📍 ${a.title} → ${b.title}</div>` +
      `<div class="pop-desc">직선 ${km.toFixed(2)}km · 도보 약 ${min}분</div>`
    ).openPopup();
    map.fitBounds([[a.lat,a.lng],[b.lat,b.lng]],{padding:[60,60],maxZoom:15});
  }
}

let festDateFilter = 'June 10';
let festDistFilter = 'all';
let festCatFilter = 'all';
let festChecked = new Set();
const evDetailCache = {};

/* ---------- EVENT DETAIL MODAL ---------- */
function openEvModal(ev, id){
  // 이미 열려있으면 닫기
  const existing = document.getElementById('evOverlay');
  if(existing){ existing.remove(); return; }

  const dkColor = DISTRICT_COLORS[ev.district]||'#888';
  const overlay = document.createElement('div');
  overlay.className='ev-overlay'; overlay.id='evOverlay';

  overlay.innerHTML=`
    <div class="ev-modal" id="evModal">
      <div class="ev-header">
        <button class="ev-close" id="evClose">✕</button>
        <div class="ev-hed-title">${ev.title}</div>
        <div class="ev-hed-meta">
          <span class="ev-hed-time">${ev.time}</span>
          <span>${ev.venue}</span>
          <span class="ev-hed-dk" style="background:${dkColor}">${ev.district}</span>
        </div>
      </div>
      <div class="ev-photo-placeholder">
        <div class="ev-photo-icon">🏛</div>
        <div class="ev-photo-vname">${ev.venue.toUpperCase()}</div>
      </div>
      <div class="ev-body" id="evBody">
        <div class="ev-section">
          <div class="ev-section-label">행사 설명</div>
          <div class="ev-section-body">${ev.desc}</div>
        </div>
        <div id="evDetail">
          <div class="ev-loading"><div class="ev-spin"></div>상세 정보를 불러오는 중...</div>
        </div>
      </div>
      <div class="ev-add-row">
        <button class="ev-add-btn ${festChecked.has(id)?'done':''}" id="evAddBtn">
          ${festChecked.has(id)?'✓ 일정에 추가됨':'＋ 일정에 추가'}
        </button>
      </div>
    </div>`;

  // 닫기
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });
  overlay.querySelector('#evClose').onclick = ()=>overlay.remove();

  // 일정 추가 버튼
  overlay.querySelector('#evAddBtn').onclick = ()=>{
    const btn = overlay.querySelector('#evAddBtn');
    if(festChecked.has(id)){
      festChecked.delete(id);
      btn.textContent='＋ 일정에 추가'; btn.classList.remove('done');
    } else {
      festChecked.add(id);
      btn.textContent='✓ 일정에 추가됨'; btn.classList.add('done');
    }
    updateFestBar();
  };

  document.body.appendChild(overlay);

  // 상세 정보 로드
  loadEvDetail(ev, id);
}

async function loadEvDetail(ev, id){
  const detailEl = document.getElementById('evDetail');
  if(!detailEl) return;

  if(evDetailCache[id]){
    renderEvDetail(evDetailCache[id], detailEl);
    return;
  }

  const sys = `너는 코펜하겐 3 Days of Design 2026 페스티벌 전문가다. 행사 정보를 받아 JSON만 출력한다. 마크다운·설명 절대 금지.

예약 분류 기준 (매우 중요):
- "불필요": 쇼룸 방문, 전시 관람, 브렉퍼스트/커피/토크/워크숍 등 브랜드가 무료로 여는 행사. 3 Days of Design 행사의 90% 이상이 여기에 해당. 브랜드 초대 행사, 오프닝, 가이드 투어 등 모두 불필요.
- "티켓 필요": 공식 홈페이지 Shop(https://www.3daysofdesign.dk/shop)에서 유료 티켓을 판매하는 행사만. 대표 예: Long Table Dinner, Entering the Now Symposium, 유료 워크숍. 행사명이나 설명에 "ticket", "티켓", "유료", "dinner" 등 명확한 근거가 있을 때만 선택.
- "사전등록 권장": 위 두 경우가 아닌, 무료이지만 인원 제한으로 사전 온라인 등록이 필요하다고 명시된 경우에만. 근거 없으면 "불필요"로 분류.

출력 형식:
{
  "detail": "3~4문장 상세 설명 (한국어, 행사 성격·볼거리·분위기)",
  "reservation": "불필요" | "사전등록 권장" | "티켓 필요",
  "reservationNote": "예약 관련 한 줄 안내. 불필요이면 빈 문자열",
  "bookingUrl": "티켓 필요인 경우 https://www.3daysofdesign.dk/shop, 사전등록 권장인 경우 https://www.3daysofdesign.dk/events, 불필요이면 빈 문자열",
  "items": ["준비물1","준비물2",...],
  "duration": "예상 소요시간 (예: 30분~1시간)",
  "tips": "현장 팁 한 문장"
}`;

  const input = `행사명: ${ev.title}
장소: ${ev.venue} (${ev.address})
날짜/시간: ${ev.date} ${ev.time}
지구: ${ev.district}
설명: ${ev.desc}`;

  try{
    const resp = await fetch('/api/extract',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({system:sys, input, max_tokens:600})
    });
    if(!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    const txt = (data.text||'').replace(/```json|```/g,'').trim();
    const obj = JSON.parse(txt);
    evDetailCache[id] = obj;
    if(document.getElementById('evDetail')) renderEvDetail(obj, document.getElementById('evDetail'));
  } catch(e){
    if(detailEl) detailEl.innerHTML=`<div style="font-size:12px;color:var(--slate);opacity:.7">상세 정보를 불러올 수 없어요. (${e.message})</div>`;
  }
}

function renderEvDetail(d, el){
  const resClass = d.reservation==='불필요'?'ok': d.reservation==='사전등록 권장'?'warn':'req';
  const resIcon = d.reservation==='불필요'?'✓': d.reservation==='사전등록 권장'?'⚠':'🎫';
  el.innerHTML=`
    <div class="ev-section">
      <div class="ev-section-label">상세 정보</div>
      <div class="ev-section-body">${d.detail||''}</div>
    </div>
    <div class="ev-section">

function renderFest(){
  const el = document.getElementById('scroll');
  el.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.className = 'fest-wrap';
  wrap.style.cssText = 'display:flex;flex-direction:column;height:100%';

  // ── 날짜 필터
  const filters = document.createElement('div');
  filters.className = 'fest-filters';

  ['June 10','June 11','June 12'].forEach(d=>{
    const b = document.createElement('button');
    b.className = 'fest-filter-btn' + (festDateFilter===d?' active':'');
    b.textContent = d.replace('June ','6/');
    b.onclick = ()=>{ festDateFilter=d; renderFest(); };
    filters.appendChild(b);
  });

  // ── 카테고리 필터 (구분선)
  const catSep = document.createElement('div'); catSep.style.cssText='width:100%;height:0'; filters.appendChild(catSep);
  FEST_CATEGORIES.forEach(cat=>{
    const b = document.createElement('button');
    const isActive = festCatFilter===cat.key;
    b.className = 'fest-filter-btn cat-btn' + (isActive?' active':'');
    b.textContent = cat.key==='all' ? cat.label : `${cat.icon} ${cat.label}`;
    if(cat.key!=='all') b.style.cssText=`border-color:${cat.color};${isActive?`background:${cat.color};color:#fff`:`color:${cat.color}`}`;
    b.onclick = ()=>{ festCatFilter=cat.key; renderFest(); };
    filters.appendChild(b);
  });

  // ── 지구 필터 (구분선)
  const distSep = document.createElement('div'); distSep.style.cssText='width:100%;height:0'; filters.appendChild(distSep);
  ['all',...Object.keys(DISTRICT_COLORS)].forEach(d=>{
    const b = document.createElement('button');
    b.className = 'fest-filter-btn dist-btn' + (festDistFilter===d?' active':'');
    b.textContent = d==='all'?'전체':d;
    if(d!=='all') b.style.cssText=`border-color:${DISTRICT_COLORS[d]};${festDistFilter===d?'':'color:'+DISTRICT_COLORS[d]}`;
    b.onclick = ()=>{ festDistFilter=d; renderFest(); };
    filters.appendChild(b);
  });
  wrap.appendChild(filters);

  // ── 이벤트 목록
  const list = document.createElement('div');
  list.className = 'fest-list';

  const filtered = FESTIVAL_EVENTS.filter(e=>
    e.date===festDateFilter &&
    (festCatFilter==='all' || e.category===festCatFilter) &&
    (festDistFilter==='all' || e.district===festDistFilter)
  );

  if(filtered.length===0){
    list.innerHTML = `<div style="padding:24px;text-align:center;color:var(--slate);font-size:13px">해당 날짜/지구에 등록된 행사가 없습니다</div>`;
  }

  filtered.forEach((ev,i)=>{
    const id = `fest-${ev.date}-${i}`;
    const isChecked = festChecked.has(id);
    const row = document.createElement('div');
    row.className = 'fest-event' + (isChecked?' checked':'');
    const dkColor = DISTRICT_COLORS[ev.district]||'#888';
    const catInfo = FEST_CATEGORIES.find(c=>c.key===ev.category)||FEST_CATEGORIES[0];
    row.innerHTML = `
      <input type="checkbox" class="fest-cb" ${isChecked?'checked':''}>
      <div class="fest-body">
        <div class="fest-title fest-title-link">${ev.title}</div>
        <div class="fest-meta">
          <span class="fest-time">${ev.time}</span>
          <span class="fest-venue">${ev.venue}</span>
          <span class="fest-cat-badge" style="background:${catInfo.color}">${catInfo.icon} ${catInfo.label}</span>
          <span class="fest-dk" style="background:${dkColor}">${ev.district}</span>
        </div>
        <div class="fest-desc">${ev.desc}</div>
      </div>`;
    const cb = row.querySelector('.fest-cb');
    const titleEl = row.querySelector('.fest-title-link');

    cb.onchange = ()=>{
      if(cb.checked) festChecked.add(id); else festChecked.delete(id);
      row.classList.toggle('checked', cb.checked);
      updateFestBar();
    };

    // 제목 클릭 → 상세 팝업
    titleEl.addEventListener('click', e=>{
      e.stopPropagation();
      openEvModal(ev, id);
    });

    // 행 나머지 클릭 → 체크박스 토글
    row.addEventListener('click', e=>{
      if(e.target===cb || e.target===titleEl) return;
      cb.checked=!cb.checked; cb.onchange();
    });
    list.appendChild(row);
  });
  wrap.appendChild(list);

  // 하단 추가 바
  const bar = document.createElement('div');
  bar.className = 'fest-add-bar';
  bar.id = 'festBar';
  const cnt = document.createElement('span');
  cnt.className = 'fest-count';
  cnt.id = 'festCount';
  const btn = document.createElement('button');
  btn.className = 'fest-add-btn';
  btn.id = 'festAddBtn';
  btn.onclick = addFestSelected;
  bar.appendChild(cnt);
  bar.appendChild(btn);
  wrap.appendChild(bar);

  el.appendChild(wrap);
  el.style.overflow = 'hidden';
  el.style.padding = '0';
  updateFestBar();
}

function updateFestBar(){
  const cnt = document.getElementById('festCount');
  const btn = document.getElementById('festAddBtn');
  if(!cnt||!btn) return;
  const n = festChecked.size;
  cnt.textContent = n>0 ? `${n}개 선택됨` : '';
  btn.textContent = n>0 ? `일정에 추가 →` : '행사를 선택하세요';
  btn.disabled = n===0;
}

async function addFestSelected(){
  // 선택된 id → 이벤트 찾기
  const toAdd = [];
  FESTIVAL_EVENTS.forEach((ev,i)=>{
    const id = `fest-${ev.date}-${i}`;
    if(festChecked.has(id)) toAdd.push(ev);
  });

  toAdd.forEach(ev=>{
    const di = FEST_DATE_MAP[ev.date];
    if(di==null) return;
    // 중복 방지
    if(plan[di].items.some(it=>it.title===ev.title)) return;
    plan[di].items.push({
      time: ev.time.split('-')[0], // 시작 시간만
      title: ev.title,
      note: `${ev.venue} · ${ev.address} · ${ev.desc}`,
      dist: ev.district,
      _user: true,
    });
    // 시간순 정렬 (시간 있는 항목만)
    plan[di].items.sort((a,b)=>{
      const ta = a.time.replace(':','') || '9999';
      const tb = b.time.replace(':','') || '9999';
      return ta.localeCompare(tb);
    });
  });

  await savePlan();
  festChecked.clear();

  // 피드백
  const btn = document.getElementById('festAddBtn');
  if(btn){ btn.textContent=`✓ ${toAdd.length}개 추가됨`; btn.disabled=true; }
  setTimeout(()=>{ if(activeTab==='fest') renderFest(); }, 1200);
}

let currentVisDay = 0;
function renderPlan(){
  const el = document.getElementById('scroll');
  el.innerHTML = '';
  planSelItems = [];
  if(selRouteLayer){ map.removeLayer(selRouteLayer); selRouteLayer=null; }

  plan.forEach((day,di)=>{
    const d = document.createElement('div'); d.className='day';
    d.innerHTML = `
      <div class="day-head">
        <span class="day-num ${day.fest?'fest':''}">${day.fest?'FEST':'DAY'} ${di}</span>
        <span class="day-date">${day.date}</span>
        <span class="day-tag">${day.tag}</span>
      </div>
      <div class="day-body" id="body-${di}"></div>`;
    el.appendChild(d);
    const body = d.querySelector(`#body-${di}`);

    day.items.forEach((it,ii)=>{
      const coords = getItemCoords(it);
      const row = document.createElement('div');
      row.className='item'+(it._user?' user-added':'')+(it._fixed?' fixed':'');
      if(coords) row.style.cursor='pointer';

      // 선택 도트 (좌표 있는 항목만)
      const selKey = `${di}-${ii}`;
      const dot = document.createElement('div');
      dot.className='item-sel';
      dot.dataset.selkey = selKey;
      if(!coords) dot.style.visibility='hidden';

      row.innerHTML = `
        <div class="item-time">${it.time||''}</div>
        <div class="item-main">
          <div class="item-title" contenteditable spellcheck="false">${it.title||''}</div>
          <div class="item-note" contenteditable spellcheck="false">${it.note||''}</div>
          ${it.dist?`<span class="item-dist">${it.dist}</span>`:''}
          ${it._user?`<span class="item-src">＋ 내가 추가</span>`:''}
          ${it._fixed?`<span class="item-src lock">🔒 예약 확정 · 고정</span>`:''}
        </div>
        <button class="item-x" title="${it._fixed?'고정 일정':'삭제'}" ${it._fixed?'disabled':''}>${it._fixed?'🔒':'×'}</button>`;
      row.insertBefore(dot, row.firstChild);

      const t=row.querySelector('.item-title'), n=row.querySelector('.item-note');
      t.addEventListener('input',()=>{plan[di].items[ii].title=t.textContent;savePlan()});
      n.addEventListener('input',()=>{plan[di].items[ii].note=n.textContent;savePlan()});

      const xb=row.querySelector('.item-x');
      if(!it._fixed) xb.addEventListener('click',e=>{
        e.stopPropagation();
        plan[di].items.splice(ii,1);savePlan();renderPlan();
      });

      // 선택 도트 클릭 → 2항목 경로 시각화
      dot.addEventListener('click', e=>{
        e.stopPropagation();
        if(!coords) return;
        togglePlanSel(di,ii,coords.lat,coords.lng,it.title,dot);
      });

      // 행 클릭 → 지도 이동 + 드로어 열기
      row.addEventListener('click', e=>{
        if(e.target.matches('[contenteditable],[contenteditable] *,.item-x,.item-sel')) return;
        // 지도 이동 (좌표 있을 때)
        if(coords){
          map.flyTo([coords.lat,coords.lng],15,{duration:.8});
          const pinIdx = planPinLayer.findIndex(m=>{
            const ll=m.getLatLng();
            return Math.abs(ll.lat-coords.lat)<0.0001&&Math.abs(ll.lng-coords.lng)<0.0001;
          });
          if(pinIdx>=0) planPinLayer[pinIdx].openPopup();
        }
        // 드로어 열기
        openDrawer(di, ii, it.title);
      });

      body.appendChild(row);

      // 연속 항목 간 이동거리 표시
      const next = day.items[ii+1];
      if(it._lat&&it._lng&&next&&next._lat&&next._lng){
        const km = Math.hypot(it._lat-next._lat,it._lng-next._lng)*111;
        const min = Math.max(1,Math.round(km/5*60));
        const walk = document.createElement('div');
        walk.className='item-walk';
        walk.textContent=`도보 약 ${min}분 · ${km.toFixed(1)}km`;
        body.appendChild(walk);
      }
    });

    const add=document.createElement('button'); add.className='add-item'; add.textContent='+ 일정 추가';
    add.addEventListener('click',()=>{
      plan[di].items.push({time:'',title:'새 일정',note:'',dist:''});savePlan();renderPlan();
    });
    body.appendChild(add);
  });

  // 첫 렌더 시 첫 번째 날 핀 표시
  updateDayViz(currentVisDay);

  // 스크롤로 날짜 바뀌면 핀·경로 업데이트
  el.onscroll = ()=>{
    const days = el.querySelectorAll('.day');
    for(let i=0;i<days.length;i++){
      const rect=days[i].getBoundingClientRect(), pRect=el.getBoundingClientRect();
      if(rect.bottom>pRect.top+10){
        if(i!==currentVisDay){ currentVisDay=i; updateDayViz(i); }
        break;
      }
    }
  };
}

/* ---------- OPTIMIZER ENGINE ---------- */
// 날짜 인덱스 ↔ 페스티벌 매핑 (DEFAULT_PLAN 기준: 0출발 1도착 2~4페스티벌 5~8자유 9귀국)
const FEST_DAYS = [2,3,4];           // 6/10,6/11,6/12
const FREE_DAYS = [5,6,7];           // 6/13~6/15 (6/16은 출국일이라 제외)
const ARRIVAL_DAY = 1;               // 6/9 오후
// 각 페스티벌 날에 이미 배정된 지구 (동선 묶음용)
function districtsOnDay(di){
  const set=new Set();
  plan[di].items.forEach(it=>{ if(it._dk) set.add(it._dk); });
  return set;
}
// 지구 간 거리(좌표 기반) → 가장 가까운 지구 키
function nearestDistrict(lat,lng){
  let best=null,bd=1e9;
  DISTRICTS.forEach(d=>{
    const dd=Math.hypot(d.lat-lat,d.lng-lng);
    if(dd<bd){bd=dd;best=d;}
  });
  return {key:best.key, dist_km:Math.round(bd*111*10)/10, district:best};
}
// 두 지구 좌표 거리(km)
function kmBetween(a,b){return Math.hypot(a.lat-b.lat,a.lng-b.lng)*111;}

// 핵심: 추출된 장소(place)를 최적의 날/시간에 배치
function placeOptimally(place){
  // place: {title, lat, lng, districtKey, isFestival, preferTime, note, source}
  const dk = place.districtKey || (place.lat? nearestDistrict(place.lat,place.lng).key : null);
  let targetDay=null, reason='';

  // 1) 페스티벌 프로그램이면 → 같은 지구가 배정된 페스티벌 날 우선, 없으면 가장 가까운 지구의 날
  if(place.isFestival){
    let dayWithSame = FEST_DAYS.find(di=>districtsOnDay(di).has(dk));
    if(dayWithSame!=null){ targetDay=dayWithSame; reason='같은 지구 방문일에 묶음'; }
    else {
      // 지구별로 어느 페스티벌 날에 가는지 찾아 가장 가까운 지구의 날 선택
      let bestDi=FEST_DAYS[0], bd=1e9;
      FEST_DAYS.forEach(di=>{
        districtsOnDay(di).forEach(k=>{
          const A=DISTRICTS.find(x=>x.key===k), B=DISTRICTS.find(x=>x.key===dk);
          if(A&&B){const d=kmBetween(A,B); if(d<bd){bd=d;bestDi=di;}}
        });
      });
      targetDay=bestDi; reason='가장 가까운 지구의 페스티벌 날에 배치';
    }
  } else {
    // 2) 비페스티벌(상시 관광지/미술관 등) → 가장 가까운 지구가 배정된 날이 있으면 거기, 없으면 자유일 중 가장 한가한 날
    let dayWithSame = [...FEST_DAYS,...FREE_DAYS].find(di=>districtsOnDay(di).has(dk));
    if(dayWithSame!=null && dk){ targetDay=dayWithSame; reason='인접 지구 방문일에 묶음'; }
    else {
      // 자유일 중 항목 수가 가장 적은 날
      let bestDi=FREE_DAYS[0], bc=1e9;
      FREE_DAYS.forEach(di=>{ const c=plan[di].items.length; if(c<bc){bc=c;bestDi=di;} });
      targetDay=bestDi; reason='자유일 중 여유 있는 날에 배치';
    }
  }

  // 시간 결정: preferTime 있으면 사용, 없으면 해당 날 마지막 시간 뒤 슬롯
  const newItem={
    time: place.preferTime || suggestTime(targetDay),
    title: place.title,
    note: place.note || '',
    dist: dk ? ('↔ '+(DISTRICTS.find(d=>d.key===dk)?.name||'')) : '',
    _dk: dk,
    _user: true,
    _lat: place.lat, _lng: place.lng
  };
  plan[targetDay].items.push(newItem);
  sortDayByTime(targetDay);
  return {day:targetDay, dateLabel:plan[targetDay].date, reason, districtKey:dk};
}

// 시간 문자열을 분으로 (정렬용). "오전/오후/종일" 등은 적당히 매핑
function timeToMin(t){
  if(!t) return 9999;
  t=t.trim();
  const m=t.match(/(\d{1,2}):(\d{2})/);
  if(m) return (+m[1])*60+(+m[2]);
  if(t.includes('오전')) return 9*60;
  if(t.includes('오후')) return 14*60;
  if(t.includes('저녁')) return 19*60;
  if(t.includes('종일')) return 8*60;
  if(t.startsWith('~')){const mm=t.match(/(\d{1,2}):(\d{2})/);return mm?(+mm[1])*60+(+mm[2]):9999;}
  return 9999;
}
function sortDayByTime(di){ plan[di].items.sort((a,b)=>timeToMin(a.time)-timeToMin(b.time)); }
// 빈 시간 슬롯 추천: 마지막 구체 시간 +2시간
function suggestTime(di){
  const times=plan[di].items.map(it=>timeToMin(it.time)).filter(v=>v<9999&&v>=8*60&&v<22*60);
  if(!times.length) return '10:00';
  const last=Math.max(...times)+120;
  const h=Math.min(20,Math.floor(last/60)), mm=last%60;
  return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}

// 분석 결과 캐시 (같은 입력 재분석 방지)
const EXTRACT_CACHE={};

// claude.ai 아티팩트 환경인지 감지 (배포 시엔 /api/extract 사용)
const ON_CLAUDE = location.hostname.endsWith('claude.ai') || location.hostname.endsWith('claudeusercontent.com') || location.hostname==='localhost' && false;

async function extractPlace(rawText){
  // 1) 캐시
  if(EXTRACT_CACHE[rawText]) return {...EXTRACT_CACHE[rawText]};
  // 2) 사전 (API 호출 0)
  const known=checkKnown(rawText);
  if(known){ EXTRACT_CACHE[rawText]=known; return {...known}; }

  const districtList = DISTRICTS.map(d=>`${d.key}: ${d.name} (${d.desc})`).join('\n');
  const sys = `You are a Copenhagen travel assistant. Extract place/event info from user input (Korean or English) and output ONLY JSON — no markdown, no explanation.
Copenhagen 8 design districts:
${districtList}

Rules:
- title: place/event name (keep original language or translate naturally, be concise)
- lat,lng: Copenhagen coordinates if known (numbers), else null
- districtKey: closest/most relevant district key from the 8 above, null if unclear
- isFestival: true if related to 3 Days of Design festival (6/10~12) showrooms/exhibitions/talks, false for general sights/restaurants
- preferTime: explicit time → "HH:MM", else null
- note: one-line memo (feature/address hint), "" if none
For URLs, infer from domain/slug. Make reasonable guesses; use null when truly unknown.
Output format: {"title":"","lat":null,"lng":null,"districtKey":null,"isFestival":false,"preferTime":null,"note":""}`;

  let txt;
  if(ON_CLAUDE){
    // claude.ai 아티팩트: 키 없이 직접 호출
    const resp = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,system:sys,messages:[{role:"user",content:rawText}]})
    });
    if(!resp.ok) throw new Error('API '+resp.status);
    const data=await resp.json();
    txt=data.content.filter(c=>c.type==='text').map(c=>c.text).join('').trim();
  } else {
    // 배포 환경: 서버리스 함수(/api/extract)가 키를 안전하게 보관하고 대신 호출
    const resp = await fetch("/api/extract",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system:sys, input:rawText})
    });
    if(!resp.ok) throw new Error('서버 '+resp.status);
    const data=await resp.json();
    txt=(data.text||'').trim();
  }
  txt=txt.replace(/```json|```/g,'').trim();
  const obj=JSON.parse(txt);
  obj.source = rawText.startsWith('http')?'링크':'입력';
  EXTRACT_CACHE[rawText]=obj;
  return obj;
}

/* 입력 의도 분류: 장소추가 vs 일정수정 */
function classifyIntent(raw){
  const modifyKw = /바꿔|수정|변경|삭제|이동|추가해줘|넣어줘|옮겨|고쳐|change|move|delete|update|remove|modify|reschedule|shift|cancel/i;
  return modifyKw.test(raw) ? 'modify' : 'add';
}

/* 충돌 감지: 같은 날 같은 시간대(±90분)에 항목이 있는지 */
function detectConflict(di, newTime){
  if(!newTime) return null;
  const newMin = timeToMin(newTime);
  if(newMin>=9999) return null;
  return plan[di].items.find(it=>{
    const m = timeToMin(it.time);
    return m<9999 && Math.abs(m-newMin)<=90;
  }) || null;
}

/* 충돌 카드 표시 */
function showConflictCard(st, place, result, conflictItem){
  const distName = result.districtKey?(DISTRICTS.find(d=>d.key===result.districtKey)?.name||''):'';
  st.innerHTML=`
    <div class="conflict-card">
      <b>⚠ 일정 충돌</b><br>
      <b>${plan[result.day].date}</b> ${plan[result.day].items[0]?'':''}에 이미
      <b>"${conflictItem.title}" (${conflictItem.time})</b>이 있어요.<br>
      "${place.title}"을 어떻게 배치할까요?
      <div class="conflict-opts">
        <button class="conflict-btn primary" id="cfAddAnyway">이 날 그대로 추가</button>
        <button class="conflict-btn" id="cfPickDay">다른 날 선택 ▾</button>
        <button class="conflict-btn" id="cfCancel">취소</button>
      </div>
      <div id="cfDayPicker" style="display:none;margin-top:8px">
        <select style="width:100%;padding:6px;border:1.5px solid var(--ink);font-family:'Archivo';font-size:13px">
          ${plan.map((d,i)=>`<option value="${i}">${d.date} · ${d.tag}</option>`).join('')}
        </select>
        <button class="conflict-btn primary" style="margin-top:6px;width:100%" id="cfConfirmDay">이 날에 추가</button>
      </div>
    </div>`;

  st.querySelector('#cfAddAnyway').onclick = async()=>{
    plan[result.day].items.push(result._item);
    sortDayByTime(result.day);
    await savePlan(); addUserMarker(place);
    if(place.lat) map.flyTo([place.lat,place.lng],14,{duration:1});
    st.innerHTML=`<div class="status show"><b>✓ "${place.title}"</b> 추가 완료! → <b>${plan[result.day].date}</b></div>`;
  };
  st.querySelector('#cfPickDay').onclick = ()=>{
    const picker = st.querySelector('#cfDayPicker');
    picker.style.display = picker.style.display==='none'?'block':'none';
  };
  st.querySelector('#cfConfirmDay').onclick = async()=>{
    const sel = st.querySelector('select');
    const di = +sel.value;
    result._item.time = suggestTime(di);
    plan[di].items.push(result._item);
    sortDayByTime(di);
    await savePlan(); addUserMarker(place);
    if(place.lat) map.flyTo([place.lat,place.lng],14,{duration:1});
    st.innerHTML=`<div class="status show"><b>✓ "${place.title}"</b> → <b>${plan[di].date}</b>에 추가됐어요!</div>`;
  };
  st.querySelector('#cfCancel').onclick = ()=>{ st.innerHTML=''; };
}

async function runSmartAdd(){
  const input = document.getElementById('addInput');
  const btn = document.getElementById('addBtn');
  const st = document.getElementById('addStatus');
  const raw = input.value.trim();
  if(!raw){ input.focus(); return; }

  btn.disabled=true; btn.textContent='분석 중...';
  st.innerHTML=`<div class="status show"><span class="spin"></span> 분석 중이에요...</div>`;

  try{
    const intent = classifyIntent(raw);

    if(intent==='modify'){
      // 일정 수정 모드
      st.innerHTML=`<div class="status show"><span class="spin"></span> 일정을 수정하고 있어요...</div>`;
      const sys = `You are a Copenhagen trip plan editor. Given the current plan JSON and a modification request (Korean or English), output ONLY the updated full plan JSON array. No markdown, no explanation.
Rules: never delete _fixed:true items; preserve _user,_fixed,_lat,_lng,_dk fields; sort by time after changes.`;
      const planJson = JSON.stringify(plan.map(day=>({
        date:day.date,tag:day.tag,fest:day.fest,
        items:day.items.map(it=>({time:it.time,title:it.title,note:it.note,dist:it.dist,
          _fixed:it._fixed||undefined,_user:it._user||undefined,
          _lat:it._lat||undefined,_lng:it._lng||undefined,_dk:it._dk||undefined}))
      })));
      const resp = await fetch('/api/extract',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({system:sys,input:`Current plan:\n${planJson}\n\nRequest: ${raw}`,max_tokens:4000})});
      if(!resp.ok) throw new Error('서버 '+resp.status);
      const data = await resp.json();
      const txt = (data.text||'').replace(/```json|```/g,'').trim();
      const updated = JSON.parse(txt);
      if(!Array.isArray(updated)) throw new Error('형식 오류');
      updated.forEach((day,di)=>{
        if(!plan[di]) return;
        const fixed = plan[di].items.filter(it=>it._fixed);
        plan[di].items = day.items;
        fixed.forEach(fi=>{ if(!plan[di].items.some(it=>it.title===fi.title)) plan[di].items.push(fi); });
        sortDayByTime(di);
      });
      await savePlan();
      input.value='';
      st.innerHTML=`<div class="status show"><b>✓ 일정이 수정됐어요!</b> 일정 탭에서 확인하세요.</div>`;
      if(activeTab==='plan') renderPlan();

    } else {
      // 장소 추가 모드
      const place = await extractPlace(raw);
      if(!place.title) place.title=raw.slice(0,40);
      const result = placeOptimally(place);
      // _item을 result에 저장 (충돌 카드에서 재사용)
      result._item = plan[result.day].items.pop(); // placeOptimally가 이미 push했으므로 꺼냄

      const conflict = detectConflict(result.day, result._item.time);
      if(conflict){
        st.innerHTML='';
        showConflictCard(st, place, result, conflict);
        input.value='';
      } else {
        // 충돌 없음 → 바로 추가
        plan[result.day].items.push(result._item);
        sortDayByTime(result.day);
        await savePlan();
        addUserMarker(place);
        const distName = result.districtKey?(DISTRICTS.find(d=>d.key===result.districtKey)?.name||''):'';
        input.value='';
        st.innerHTML=`<div class="status show">
          <b>✓ "${place.title}"</b> 추가 완료!
          <div class="placed">→ <b>${result.dateLabel}</b>${distName?' · '+distName:''}</div>
          <div class="placed" style="opacity:.7">배치 근거: ${result.reason}</div>
        </div>`;
        if(place.lat) map.flyTo([place.lat,place.lng],14,{duration:1});
      }
    }
  } catch(e){
    st.innerHTML=`<div class="status show err">실패했어요 (${e.message}). 더 구체적으로 입력하거나 다시 시도해 주세요.</div>`;
  } finally{
    btn.disabled=false; btn.textContent='✦ 분석해서 반영하기';
  }
}

    st.textContent='✓ 수정됐어요!';
    if(activeTab==='plan') renderPlan();
    setTimeout(closeDrawer, 1200);
  }catch(e){
    st.className='drawer-status show err';
    st.textContent=`실패 (${e.message})`;
  }finally{
    btn.disabled=false; btn.textContent='전송';
  }
}

// 사용자 추가 장소 지도 마커
const userMarkers=[];
function addUserMarker(place){
  if(!place.lat||!place.lng) return;
  const icon=L.divIcon({className:'',html:`<div class="pin" style="background:var(--ochre)"><span>+</span></div>`,iconSize:[26,26],iconAnchor:[13,26],popupAnchor:[0,-26]});
  const m=L.marker([place.lat,place.lng],{icon}).addTo(map);
  m.bindPopup(`<div class="pop-name">${place.title}</div><div class="pop-desc">${place.note||'사용자 추가 장소'}</div>`);
  userMarkers.push(m);
}

/* ---------- TABS ---------- */
let activeTab='plan';
function setTab(t){
  activeTab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  if(t==='plan'){
    document.getElementById('scroll').style.cssText='';
    renderPlan();
  } else if(t==='fest'){
    renderFest();
  } else if(t==='add'){
    document.getElementById('scroll').style.cssText='';
    renderAdd();
  } else if(t==='dist'){
    document.getElementById('scroll').style.cssText='';
    renderDist();
  } else {
    document.getElementById('scroll').style.cssText='';
    renderInfo();
  }
}
document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.tab)));

/* ---------- GPS (무료, 브라우저 내장) ---------- */
let meMarker=null;
function haversineKm(a,b,c,d){
  const R=6371,toR=x=>x*Math.PI/180;
  const dLat=toR(c-a),dLng=toR(d-b);
  const x=Math.sin(dLat/2)**2+Math.cos(toR(a))*Math.cos(toR(c))*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function walkMin(km){return Math.max(1,Math.round(km/5*60));} // 도보 5km/h 기준
document.getElementById('gpsBtn').addEventListener('click',()=>{
  const btn=document.getElementById('gpsBtn'), info=document.getElementById('gpsInfo');
  if(!navigator.geolocation){
    info.className='gps-info show'; info.innerHTML='이 브라우저는 위치 기능을 지원하지 않아요.'; return;
  }
  btn.disabled=true; btn.textContent='◎ 찾는 중...';
  navigator.geolocation.getCurrentPosition(
    pos=>{
      const {latitude:la,longitude:lo}=pos.coords;
      if(meMarker) map.removeLayer(meMarker);
      const icon=L.divIcon({className:'',html:`<div class="me-dot me-pulse"></div>`,iconSize:[18,18],iconAnchor:[9,9]});
      meMarker=L.marker([la,lo],{icon,zIndexOffset:1000}).addTo(map);
      meMarker.bindPopup('<div class="pop-name">📍 내 위치</div>');
      map.flyTo([la,lo],14,{duration:1});
      // 가장 가까운 디자인 지구 + 숙소까지 거리
      let near=null,nd=1e9;
      DISTRICTS.forEach(d=>{const km=haversineKm(la,lo,d.lat,d.lng); if(km<nd){nd=km;near=d;}});
      const stayKm=haversineKm(la,lo,STAY.lat,STAY.lng);
      const saluKm=haversineKm(la,lo,55.665398,12.550298);
      info.className='gps-info show';
      info.innerHTML=`<b>가장 가까운 지구</b><br>${near.name} · ${nd.toFixed(1)}km (도보 ~${walkMin(nd)}분)
        <br><br>🏠 숙소까지 ${stayKm.toFixed(1)}km (~${walkMin(stayKm)}분)
        <br>🍽 SALU까지 ${saluKm.toFixed(1)}km (~${walkMin(saluKm)}분)`;
      btn.classList.add('active'); btn.disabled=false; btn.textContent='◎ 내 위치';
    },
    err=>{
      info.className='gps-info show';
      const msg=err.code===1?'위치 권한이 거부됐어요. 브라우저 설정에서 허용해 주세요.':'위치를 가져오지 못했어요. 잠시 후 다시 시도해 주세요.';
      info.innerHTML=msg;
      btn.disabled=false; btn.textContent='◎ 내 위치';
    },
    {enableHighAccuracy:true,timeout:10000,maximumAge:60000}
  );
});

/* ---------- INIT ---------- */
(async()=>{
  await loadPlan();
  // 저장된 사용자 추가 장소의 지도 마커 복원

    if(it._user && it._lat && it._lng) addUserMarker({title:it.title,note:it.note,lat:it._lat,lng:it._lng});

  setTab('plan');
})();
