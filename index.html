<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3 Days of Design 2026 · Copenhagen Trip Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,400&family=Space+Mono:wght@400;700&family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon-192.png" type="image/png">
<meta name="theme-color" content="#c8492a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="panel">
    <header class="brand">
      <div class="kicker"><span>COPENHAGEN · DENMARK</span><span class="dot"></span></div>
      <h1>3 Days of <em>Design</em><br>2026</h1>
      <div class="sub">JUN 8 — JUN 16 · 미주 & 상효 · "Make This Moment Matter"</div>
      <div class="user-selector" id="userSelector">
        <button class="user-sel-btn" data-user="miju">미주</button>
        <button class="user-sel-btn" data-user="sanghyo">상효</button>
      </div>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="plan">일정</button>
      <button class="tab" data-tab="rec">추천</button>
      <button class="tab" data-tab="fest">행사</button>
      <button class="tab" data-tab="add">＋장소</button>
      <button class="tab" data-tab="dist">지구</button>
      <button class="tab" data-tab="info">정보</button>
    </div>

    <div class="scroll" id="scroll"></div>

    <div class="saver" id="saver"><span class="pulse"></span> 자동 저장됨</div>
    <button class="reset" id="reset">초기화</button>

    <!-- 일정 항목 컨텍스트 드로어 -->
    <div class="item-drawer" id="itemDrawer">
      <div class="drawer-head">
        <span class="drawer-icon">✦ AI</span>
        <span class="drawer-label" id="drawerLabel"></span>
        <button id="drawerMapBtn" title="지도에서 경로 보기" style="background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;color:var(--teal)">🗺</button>
        <button class="drawer-close" id="drawerClose">✕</button>
      </div>
      <div class="drawer-privacy" id="drawerPrivacy">
        <div class="drawer-privacy-row">
          <span class="drawer-privacy-label">참가자</span>
          <button class="drawer-with-btn" data-with="both">👥 함께</button>
          <button class="drawer-with-btn" data-with="miju">👩 미주만</button>
          <button class="drawer-with-btn" data-with="sanghyo">🧑 상효만</button>
        </div>
        <div class="drawer-privacy-row">
          <span class="drawer-privacy-label">공개</span>
          <button class="drawer-vis-btn" data-vis="shared">공유</button>
          <button class="drawer-vis-btn" data-vis="personal">🔒 나만보기</button>
        </div>
      </div>
      <div class="drawer-row">
        <textarea class="drawer-input" id="drawerInput" rows="2" placeholder="이 일정에 대해 자유롭게 요청하세요..."></textarea>
        <button class="drawer-send" id="drawerSend">전송</button>
      </div>
      <div class="drawer-status" id="drawerStatus"></div>
      <div class="drawer-response" id="drawerResponse">
        <div class="drawer-resp-text" id="drawerRespText"></div>
        <div class="drawer-resp-actions" id="drawerRespActions"></div>
      </div>
    </div>
  </aside>

  <!-- MAP -->
  <main class="map-wrap">
    <div class="map-handle" id="mapHandle"><div class="map-handle-bar"></div></div>
    <div id="map"></div>
    <div class="map-legend">
      <h4>8 Design Districts</h4>
      <div id="legend"></div>
    </div>
    <button class="gps-btn" id="gpsBtn" title="내 위치 찾기">◎ 내 위치</button>
    <div class="gps-info" id="gpsInfo"></div>
    <div class="map-title">10–12 JUN · 8 DISTRICTS · 460+ BRANDS</div>
  </main>
</div>

<!-- 행사 이벤트 데이터 (796개) -->
<script src="/events-data.js"></script>

<!-- LOGIN MODAL -->
<div class="login-overlay" id="loginOverlay" style="display:none">
  <div class="login-modal">
    <div class="login-hd">
      <div class="kicker">COPENHAGEN · 2026</div>
      <h2>3 Days of <em>Design</em></h2>
    </div>
    <div class="login-bd">
      <p class="login-lead">누구로 접속할까요?</p>
      <div class="login-users">
        <button class="login-user-btn" data-user="miju">👩 미주</button>
        <button class="login-user-btn" data-user="sanghyo">🧑 상효</button>
      </div>
      <div id="loginPwRow" style="display:none">
        <div class="login-pw-row">
          <input type="password" class="login-pw-inp" id="loginPw" placeholder="비밀번호">
          <button class="login-pw-sub" id="loginSub">입장 →</button>
        </div>
        <div class="login-err" id="loginErr"></div>
      </div>
    </div>
    <button class="login-skip" id="loginSkip">이 기기에만 저장 (로컬 모드)</button>
  </div>
</div>

<script src="./src/app.js"></script>
</body>
</html>
